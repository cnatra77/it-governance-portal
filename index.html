<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramsey County IT Governance Portal</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; color: #1a1a1a; background: #f5f6f7; }

/* ── Shell ────────────────────────────────────────────────────────────── */
#gp { display: flex; height: 100vh; min-height: 600px; border: 1px solid #d8d8d8; border-radius: 8px; overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

/* ── Sidebar nav ─────────────────────────────────────────────────────── */
#sidebar { width: 180px; background: #f5f6f7; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; padding: 12px 8px; flex-shrink: 0; overflow-y: auto; }
.nav-brand { padding: 6px 6px 14px; border-bottom: 1px solid #e0e0e0; margin-bottom: 10px; }
.nav-brand-title { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.nav-brand-sub { font-size: 10px; color: #888; margin-top: 2px; }
#navItems { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.nav-footer { padding-top: 10px; border-top: 1px solid #e0e0e0; font-size: 10px; color: #aaa; font-family: 'Courier New', monospace; }

/* Nav items */
.ni { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border: none; background: none; width: 100%; text-align: left; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; color: #666; font-family: 'Segoe UI', sans-serif; transition: all 0.12s; }
.ni:hover { background: #fff; color: #1a1a1a; }
.ni.on { background: #fff; color: #185FA5; border-radius: 0; border-left: 2px solid #185FA5; padding-left: 8px; }
.ni .ico { font-size: 12px; }

/* ── Main content ────────────────────────────────────────────────────── */
#main { flex: 1; overflow-y: auto; background: #f0f1f3; padding: 18px; }

/* ── Cards ───────────────────────────────────────────────────────────── */
.card { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px 16px; }
.dcard { background: #fff; border: 1px solid #e8e8e8; border-radius: 6px; padding: 12px; transition: border-color 0.12s; }
.dcard:hover { border-color: #c0c0c0; }

/* ── Metric tiles ────────────────────────────────────────────────────── */
.metric { border-radius: 0; padding: 10px 12px; border-left: 2px solid; background: #f8f9fa; }

/* ── Buttons ─────────────────────────────────────────────────────────── */
.fbtn { border: 1px solid #d0d0d0; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: 'Segoe UI', sans-serif; color: #555; background: #fff; transition: all 0.12s; }
.fbtn:hover { background: #f0f0f0; }
.fbtn.on { background: #E6F1FB; color: #0C447C; border-color: #185FA5; }

/* ── Committee tabs ──────────────────────────────────────────────────── */
.ctab { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Segoe UI', sans-serif; border: 1px solid #d0d0d0; background: #fff; color: #666; transition: all 0.12s; }
.ctab:hover { color: #1a1a1a; }

/* ── Chips / badges ──────────────────────────────────────────────────── */
.chip { display: inline-flex; align-items: center; padding: 1px 7px; border-radius: 100px; font-size: 10px; font-weight: 600; letter-spacing: 0.02em; }

/* ── Triage buttons ──────────────────────────────────────────────────── */
.tqbtn { flex: 1; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Segoe UI', sans-serif; border: 1px solid #d0d0d0; transition: all 0.12s; }
.tqbtn:hover { border-color: #999; }

/* ── Search input ────────────────────────────────────────────────────── */
input[type=search] { border: 1px solid #d0d0d0; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; outline: none; width: 100%; }
input[type=search]:focus { border-color: #185FA5; box-shadow: 0 0 0 2px rgba(24,95,165,0.12); }

/* ── Tables ──────────────────────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 10px; font-weight: 600; font-size: 11px; border-bottom: 1px solid #e0e0e0; color: #555; background: #f8f9fa; }
td { padding: 7px 10px; border-bottom: 1px solid #eeeeee; vertical-align: top; color: #333; }
tr:last-child td { border-bottom: none; }

/* ── Swim lane placeholders ──────────────────────────────────────────── */
.sw-placeholder { background: #fafafa; border: 1px dashed #d0d0d0; border-radius: 6px; padding: 10px; display: flex; align-items: center; justify-content: center; min-height: 80px; }

/* ── Utility ─────────────────────────────────────────────────────────── */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>

function go(sec){

function buildNav(){

  if(si) si.addEventListener('input',function(){STATE.docSearch=this.value;renderMain();});
}

    +'<div style="margin-bottom:14px">'
    +'<div style="font-size:17px;font-weight:600;margin-bottom:3px">Pre-intake triage wizard</div>'
    +'<div style="font-size:12px;color:#888">Answer 6 questions to find your governance path — takes under 2 minutes.</div>'
    +'</div>'
    +'<div class="card" style="margin-bottom:10px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'

    +'<span style="font-size:11px;color:#888;font-family:\'Courier New\',monospace">'+pct+'%</span>'

    +'<button class="tqbtn" onclick="triageAnswer(\'yes\')" style="background:#E6F1FB;color:#0C447C;border-color:#185FA5">Yes — governance likely applies</button>'
    +'<button class="tqbtn" onclick="triageAnswer(\'no\')" style="background:#f8f9fa;color:#666">No — this does not apply</button>'
    +'</div></div>'

      +'<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Answers so far</div>'
      +STATE.tAnswers.map(function(a,i){return '<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #e8e8e8;align-items:center;font-size:12px">'
        +'<span style="font-family:\'Courier New\',monospace;font-size:10px;color:#888;width:22px">Q'+(i+1)+'</span>'
        +'<span style="flex:1;color:#333">'+(TQ[i].q)+'</span>'
        +'<span style="font-weight:700;color:'+(a==='yes'?'#185FA5':'#888')+'">'+a+'</span>'
        +'</div>';}).join('')
      +'</div>':'')
    +'</div>';
}

function triageAnswer(ans){
  STATE.tAnswers.push(ans);
  if(STATE.tAnswers[0]==='no'){
    STATE.tResult={path:'Not in scope — no governance required',desc:'This appears to be a non-technology business process request. IT governance does not apply. Confirm with your department head and log through the standard IT Service Desk.',comms:[],bg:'#f5f6f7',bd:'#d0d0d0',tx:'#555'};
  } else if(STATE.tAnswers.length===TQ.length){
    var a=STATE.tAnswers;
    var comms=['PPRC'];
    if(a[2]==='yes'||a[3]==='yes') comms.push('SPRC');
    if(a[4]==='yes') comms.push('ASC');
    if(a[5]==='yes') comms.push('ITSC');
    var isLarge=a[5]==='yes';
    var isMed=!isLarge&&(a[1]==='yes'||comms.length>1);
    if(isLarge){
      STATE.tResult={path:'Large project — full governance path',desc:'All four committees must review. ITSC is the final decision authority. Contact the Governance Coordinator immediately to begin scheduling.',comms:comms,sla:'25–35 business days (full path)',next:'Contact the Governance Coordinator. Complete RC-GOV-006 intake form. PPRC scheduling begins immediately.',bg:'#FCEBEB',bd:'#A32D2D',tx:'#791F1F'};
    } else if(isMed){
      STATE.tResult={path:'Medium project',desc:'PPRC will classify and route to the triggered committees. Complete the full intake form and PPRC will confirm routing via the 7-question decision tree.',comms:comms,sla:'15–25 business days (triggered committees)',next:'Complete RC-GOV-006 Intake Form. Submit to the Governance Coordinator.',bg:'#FAEEDA',bd:'#854F0B',tx:'#633806'};
    } else {
      STATE.tResult={path:'Small project',desc:'PPRC reviews within 5 business days of a complete intake package. Minimal documentation required at this classification level.',comms:comms,sla:'5 business days (PPRC only)',next:'Complete RC-GOV-004 Triage Tool, then RC-GOV-006 Intake Form. Submit to the Governance Coordinator.',bg:'#E6F1FB',bd:'#185FA5',tx:'#0C447C'};
    }
  } else {
    STATE.tStep++;
  }
  renderMain();
}

function resetTriage(){STATE.tStep=0;STATE.tAnswers=[];STATE.tResult=null;renderMain();}

function renderDocs(){
  var filtered=DOCS.filter(function(d){
    var mp=STATE.docPhase===0||d.ph===STATE.docPhase;
    var ms=!STATE.docSearch||d.title.toLowerCase().indexOf(STATE.docSearch.toLowerCase())>-1||d.desc.toLowerCase().indexOf(STATE.docSearch.toLowerCase())>-1;
    return mp&&ms;
  });
  var grouped=PHASES.map(function(p){
    return {n:p.n,label:p.label,docs:filtered.filter(function(d){return d.ph===p.n;})};
  }).filter(function(p){return p.docs.length;});

  return '<div style="margin-bottom:14px">'
    +'<div style="font-size:17px;font-weight:600;margin-bottom:3px">Document library</div>'
    +'<div style="font-size:12px;color:#888">All 21 RC-GOV framework documents organized by governance phase.</div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">'
    +'<input type="search" placeholder="Search documents..." value="'+STATE.docSearch+'" style="max-width:220px">'
    +'<button class="fbtn'+(STATE.docPhase===0?' on':'')+'" onclick="STATE.docPhase=0;renderMain()">All</button>'
    +PHASES.map(function(p){
      var isOn=STATE.docPhase===p.n;
      return '<button class="fbtn'+(isOn?' on':'')+'" onclick="STATE.docPhase='+p.n+';renderMain()" style="'+(isOn?'background:'+PC[p.n].bg+';color:'+PC[p.n].tx+';border-color:'+PC[p.n].bd:'')+'">P'+p.n+'</button>';
    }).join('')
    +'</div>'
    +grouped.map(function(ph){
      return '<div style="margin-bottom:20px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
        +'<div style="width:22px;height:22px;border-radius:4px;background:'+PC[ph.n].bd+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
        +'<span style="font-size:11px;font-weight:700;color:#fff">'+ph.n+'</span></div>'
        +'<span style="font-size:13px;font-weight:600;color:#1a1a1a">Phase '+ph.n+' — '+ph.label+'</span>'
        +'<span style="font-size:11px;color:#888">('+ph.docs.length+' document'+(ph.docs.length!==1?'s':'')+')</span>'
        +'</div>'
        +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
        +ph.docs.map(function(d){
          return '<div class="dcard">'
            +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
            +'<span style="font-family:\'Courier New\',monospace;font-size:10px;font-weight:700;color:'+PC[d.ph].tx+';background:'+PC[d.ph].bg+';padding:2px 7px;border-radius:3px">RC-GOV-'+d.id+'</span>'
            +'<span class="chip" style="background:'+TC[d.type].bg+';color:'+TC[d.type].tx+'">'+d.type+'</span>'
            +'</div>'
            +'<div style="font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:5px;line-height:1.35">'+d.title+'</div>'
            +'<div style="font-size:11px;color:#666;line-height:1.5">'+d.desc+'</div>'
            +'</div>';
        }).join('')
        +'</div></div>';
    }).join('')
    +(!grouped.length?'<div style="padding:32px;text-align:center;color:#888;font-size:13px">No documents match your filter. <button onclick="STATE.docSearch=\'\';STATE.docPhase=0;renderMain()" style="background:none;border:none;color:#185FA5;cursor:pointer;font-family:\'Segoe UI\',sans-serif;font-size:13px">Clear filters</button></div>':'');
}

    ['ASC — architecture review','Architecture package complete','10 business days','CIO notified if 15 days elapsed','Complex systems may request 5-day extension',CC.ASC],

    ['ITSC — executive decision','All prior committee outputs received','15 business days','County manager notification if 25 days elapsed','ITSC meets monthly; expedited sessions available',CC.ITSC],
    ['Conditions resolution','Condition date set at time of decision','Per condition due date','Escalate to PPRC/ITSC if 15+ days overdue','Project cannot advance gate until all conditions closed',{tx:'#633806',bg:'#FAEEDA',bd:'#854F0B'}],
    ['Intake return — incomplete','Incomplete package submitted','2 business days to return with gap list','No escalation — responsibility lies with requestor','SLA clock does not start until gaps are resolved',{tx:'#555',bg:'#f5f6f7',bd:'#d0d0d0'}],
  ];
  var kpis=[
    {m:'PPRC SLA compliance',t:'≥ 90%',w:'Below 80% triggers review',c:CC.PPRC},
    {m:'ASC/SPRC SLA compliance',t:'≥ 85%',w:'Below 75% triggers review',c:CC.ASC},
    {m:'ITSC scheduling SLA',t:'≥ 90%',w:'Below 80% triggers review',c:CC.ITSC},
    {m:'End-to-end cycle (large projects)',t:'≤ 30 days',w:'Above 40 days triggers review',c:{tx:'#633806',bg:'#FAEEDA',bd:'#854F0B'}},
    {m:'Open conditions overdue > 30 days',t:'Target: 0',w:'More than 3 items → ITSC review',c:CC.SPRC},
    {m:'Decision log completeness',t:'100%',w:'Below 95% triggers coordinator review',c:{tx:'#27500A',bg:'#EAF3DE',bd:'#3B6D11'}},
  ];
  var breach=[
    {s:'First SLA breach in a committee',a:'Coordinator documents reason. Chair notified. No formal escalation.',sev:'low',sc:'#27500A',bg:'#EAF3DE'},
    {s:'Second or subsequent breach in the same quarter',a:'CIO notified. Root cause review required. ITSC reviews capacity.',sev:'medium',sc:'#633806',bg:'#FAEEDA'},
    {s:'Conditions overdue by 15 or more business days',a:'Auto-escalation to PPRC chair and project sponsor. Project cannot advance.',sev:'high',sc:'#791F1F',bg:'#FCEBEB'},
    {s:'Requestor fails to resolve intake gaps within 30 days',a:'Intake marked "Withdrawn — Resubmit Required." Restart from RC-GOV-004.',sev:'medium',sc:'#633806',bg:'#FAEEDA'},
    {s:'Project proceeds without required committee approval',a:'CIO and ITSC notified immediately. Project placed on hold. Funding withheld.',sev:'critical',sc:'#501313',bg:'#FCEBEB'},
  ];
  return '<div style="margin-bottom:14px">'
    +'<div style="font-size:17px;font-weight:600;margin-bottom:3px">SLA &amp; service standards</div>'
    +'<div style="font-size:12px;color:#888">Response time commitments, escalation triggers, and governance performance metrics (RC-GOV-016).</div>'
    +'</div>'
    +'<div style="background:#FAEEDA;border-left:3px solid #854F0B;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start">'
    +'<span style="font-size:13px;font-weight:700;color:#633806;flex-shrink:0">Key rule:</span>'
    +'<div style="font-size:12px;color:#633806">The SLA clock starts when the Governance Coordinator confirms receipt of a <strong>complete</strong> intake package. Incomplete submissions are returned within 2 business days with a specific gap list. Resolving gaps restarts the clock.</div>'
    +'</div>'
    +'<div class="card" style="margin-bottom:12px">'
    +'<div style="font-size:13px;font-weight:600;margin-bottom:10px">Committee response time targets</div>'
    +'<div style="overflow-x:auto"><table>'
    +'<thead><tr style="background:#f8f9fa"><th>Committee / activity</th><th>SLA trigger</th><th>Target</th><th>Escalation after</th><th>Notes</th></tr></thead>'
    +'<tbody>'
    +slaRows.map(function(row,i){
      var col=row[5];
      return '<tr style="background:'+(i%2===0?'#f8f9fa':'#fff')+'">'
        +'<td style="font-weight:600;color:'+col.tx+'">'+row[0]+'</td>'
        +'<td style="color:#555">'+row[1]+'</td>'
        +'<td style="font-weight:700;color:#854F0B;font-family:\'Courier New\',monospace;font-size:11px">'+row[2]+'</td>'
        +'<td style="color:#A32D2D;font-size:11px">'+row[3]+'</td>'
        +'<td style="color:#888;font-size:11px;font-style:italic">'+row[4]+'</td>'
        +'</tr>';
    }).join('')
    +'</tbody></table></div></div>'
    +'<div class="card" style="margin-bottom:12px">'
    +'<div style="font-size:13px;font-weight:600;margin-bottom:10px">Quarterly performance metrics</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
    +kpis.map(function(k){return '<div style="background:'+k.c.bg+';border-left:2px solid '+k.c.bd+';padding:12px">'
      +'<div style="font-size:16px;font-weight:700;color:'+k.c.tx+'">'+k.t+'</div>'
      +'<div style="font-size:11px;font-weight:600;color:#1a1a1a;margin-top:3px">'+k.m+'</div>'

      +'</div>';}).join('')

    +'<div class="card">'
    +'<div style="font-size:13px;font-weight:600;margin-bottom:10px">SLA breach consequences</div>'
    +breach.map(function(b,i){return '<div style="display:flex;gap:10px;padding:8px 10px;background:'+(i%2===0?'#f8f9fa':'#fff')+';border-radius:6px;margin-bottom:4px;align-items:flex-start">'
      +'<span class="chip" style="background:'+b.bg+';color:'+b.sc+';flex-shrink:0;margin-top:1px">'+b.sev+'</span>'
      +'<div>'
      +'<div style="font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:2px">'+b.s+'</div>'
      +'<div style="font-size:11px;color:#666">'+b.a+'</div>'
      +'</div></div>';}).join('')
    +'</div>';
}
