function flowRender(toggle,lanes,rows,headerHtml,footerHtml){
  return '<div style="margin-bottom:12px">'+headerHtml+'</div>'
    +toggle
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px">'
    +lanes.map(l=>'<div style="background:'+l.c.bd+';border-radius:6px;padding:10px 12px;text-align:center"><div style="font-size:12px;font-weight:700;color:#fff">'+l.label+'</div><div style="font-size:10px;color:rgba(255,255,255,0.7);margin-top:2px">'+l.sub+'</div></div>').join('')
    +'</div>'
    +rows.map(row=>'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px">'
      +row.map(cell=>cell.c
        ?'<div style="background:'+cell.c.bg+';border-left:2px solid '+cell.c.bd+';padding:10px 12px;border-radius:0 6px 6px 0"><div style="font-size:11px;font-weight:600;color:'+cell.c.tx+';margin-bottom:5px">'+cell.t+'</div>'+cell.s.map(s=>'<div style="font-size:10px;color:#333;display:flex;gap:4px;margin-bottom:2px"><span style="color:'+cell.c.bd+';flex-shrink:0">&#8594;</span>'+s+'</div>').join('')+'</div>'
        :'<div style="background:#fafafa;border:1px dashed #d0d0d0;border-radius:6px;display:flex;align-items:center;justify-content:center;min-height:80px;padding:10px"><div style="font-size:10px;color:#bbb;text-align:center;font-style:italic">'+cell.ph+'</div></div>'
      ).join('')
    +'</div>').join('')
    +footerHtml;
}

</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">
<div class="card"><div style="font-size:11px;font-weight:700;color:${col.tx};text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px">Review triggers</div>${c.triggers.map(t=>`<div style="display:flex;gap:6px;font-size:12px;color:#1a1a1a;padding:4px 0"><span style="color:${col.bd};flex-shrink:0">&#8594;</span>${t}</div>`).join('')}</div>

// ── SLA ────────────────────────────────────────────────────────────────────
function sla(){
  const rows=[['PPRC — triage','Complete intake received','5 business days','CIO notified if no decision in 7 days','Includes routing determination',CC.PPRC],['ASC — architecture review','Architecture package complete','10 business days','CIO notified if 15 days elapsed','Complex systems may request 5-day extension',CC.ASC],['SPRC — security review','RC-GOV-009 package complete','10 business days','CISO escalation if 15 days elapsed','Critical items: 5-day expedited path',CC.SPRC],['ITSC — executive decision','All prior committee outputs received','15 business days','County manager notified if 25 days elapsed','Meets monthly; expedited sessions available',CC.ITSC],['Conditions resolution','Date set at time of decision','Per condition due date','Escalate to PPRC/ITSC if 15+ days overdue','Cannot advance gate until all conditions closed',{tx:'#633806',bg:'#FAEEDA',bd:'#854F0B'}],['Intake return — incomplete','Incomplete package submitted','2 business days to return with gap list','No escalation — responsibility on requestor','SLA clock does not start until gaps resolved',{tx:'#555',bg:'#f5f6f7',bd:'#d0d0d0'}]];
  const kpis=[{m:'PPRC SLA compliance',t:'≥ 90%',w:'Below 80% triggers review',c:CC.PPRC},{m:'ASC/SPRC SLA compliance',t:'≥ 85%',w:'Below 75% triggers review',c:CC.ASC},{m:'ITSC scheduling SLA',t:'≥ 90%',w:'Below 80% triggers review',c:CC.ITSC},{m:'End-to-end cycle (large projects)',t:'≤ 30 days',w:'Above 40 days triggers review',c:{tx:'#633806',bg:'#FAEEDA',bd:'#854F0B'}},{m:'Open conditions overdue >30 days',t:'Target: 0',w:'More than 3 items → ITSC review',c:CC.SPRC},{m:'Decision log completeness',t:'100%',w:'Below 95% triggers coordinator review',c:{tx:'#27500A',bg:'#EAF3DE',bd:'#3B6D11'}}];
  const breach=[{s:'First SLA breach',a:'Coordinator documents reason. Chair notified. No formal escalation.',bg:'#EAF3DE',tc:'#27500A',sev:'low'},{s:'Second or subsequent breach in the same quarter',a:'CIO notified. Root cause review required. ITSC reviews capacity.',bg:'#FAEEDA',tc:'#633806',sev:'medium'},{s:'Conditions overdue by 15 or more business days',a:'Auto-escalation to PPRC chair and project sponsor. Project cannot advance.',bg:'#FCEBEB',tc:'#791F1F',sev:'high'},{s:'Requestor fails to resolve intake gaps within 30 days',a:'Intake marked "Withdrawn — Resubmit Required." Restart from RC-GOV-004.',bg:'#FAEEDA',tc:'#633806',sev:'medium'},{s:'Project proceeds without required committee approval',a:'CIO and ITSC notified immediately. Project on hold. Funding withheld.',bg:'#FCEBEB',tc:'#501313',sev:'critical'}];
  return `<div style="margin-bottom:12px"><div style="font-size:17px;font-weight:600;margin-bottom:2px">SLA &amp; service standards</div><div style="font-size:12px;color:#888">Response time commitments, escalation triggers, and performance metrics (RC-GOV-016).</div></div>
<div style="background:#FAEEDA;border-left:3px solid #854F0B;padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start"><span style="font-size:13px;font-weight:700;color:#633806;flex-shrink:0">Key rule:</span><div style="font-size:12px;color:#633806">The SLA clock starts when the Governance Coordinator confirms receipt of a <strong>complete</strong> intake package. Incomplete submissions are returned within 2 business days with a specific gap list. Resolving gaps restarts the clock.</div></div>
<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Committee response time targets</div><div style="overflow-x:auto"><table><thead><tr><th>Committee / activity</th><th>SLA trigger</th><th>Target</th><th>Escalation after</th><th>Notes</th></tr></thead><tbody>${rows.map((r,i)=>`<tr style="background:${i%2===0?'#f8f9fa':'#fff'}"><td style="font-weight:600;color:${r[5].tx}">${r[0]}</td><td style="color:#555">${r[1]}</td><td style="font-weight:700;color:#854F0B;font-family:'Courier New',monospace;font-size:11px">${r[2]}</td><td style="color:#A32D2D;font-size:11px">${r[3]}</td><td style="color:#888;font-size:11px;font-style:italic">${r[4]}</td></tr>`).join('')}</tbody></table></div></div>
<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Quarterly performance metrics</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${kpis.map(k=>`<div style="background:${k.c.bg};border-left:2px solid ${k.c.bd};padding:12px"><div style="font-size:16px;font-weight:700;color:${k.c.tx}">${k.t}</div><div style="font-size:11px;font-weight:600;color:#1a1a1a;margin-top:2px">${k.m}</div><div style="font-size:10px;color:#666;margin-top:2px">Warning: ${k.w}</div></div>`).join('')}</div></div>
<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:10px">SLA breach consequences</div>${breach.map((b,i)=>`<div style="display:flex;gap:10px;padding:8px 10px;background:${i%2===0?'#f8f9fa':'#fff'};border-radius:6px;margin-bottom:4px;align-items:flex-start"><span class="chip" style="background:${b.bg};color:${b.tc};flex-shrink:0;margin-top:1px">${b.sev}</span><div><div style="font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:2px">${b.s}</div><div style="font-size:11px;color:#666">${b.a}</div></div></div>`).join('')}</div>`;
}

<div style="background:${col.bd};border-radius:8px;padding:13px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">

        ${[['Enterprise system\nwork identified','ESOC','#0F6E56','E1F5EE'],['Is it\noperational?','Decision point','#854F0B','FAEEDA'],['Execute via\nchange management','IS/Capability Team','#555','f5f6f7'],['Submit RC-GOV-006\nIT intake form','Project threshold\ncrossed','#185FA5','E6F1FB'],['PPRC → ASC/SPRC\n→ ITSC as required','IT governance path','#534AB7','EEEDFE'],['Gate 2 closeout\nor ESOC returns to\nongoing oversight','Completion','#0F6E56','E1F5EE']].map(([t,sub,c,bg],i)=>`
          <div style="display:flex;align-items:center;flex-shrink:0">
            <div style="background:#${bg};border:1px solid #${c}40;border-radius:6px;padding:10px 12px;min-width:130px;max-width:150px;text-align:center">
              <div style="font-size:11px;font-weight:700;color:#${c};line-height:1.3;margin-bottom:3px">${t}</div>
              <div style="font-size:9px;color:#888;font-style:italic">${sub}</div>
            </div>
            ${i<5?`<div style="color:#ccc;font-size:20px;margin:0 4px;flex-shrink:0">&#8594;</div>`:''}
          </div>`).join('')}
      </div>
    </div>`;
  }

  else if(S.esgTab==='cadence'){
    content=`<div style="margin-bottom:10px;font-size:12px;color:#888">The four governance cycles that keep enterprise systems managed throughout the year. Each cycle has a defined format, artifact, and decision output.</div>
    ${ESG_CADENCE.map(c=>`<div style="background:${c.c.bg};border:1px solid ${c.c.bd}40;border-radius:8px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div>
          <div style="font-size:16px;font-weight:700;color:${c.c.tx};margin-bottom:2px">${c.title}</div>
          <div style="font-size:11px;color:#555">Owned by: ${c.who}</div>
        </div>
        <div style="text-align:right">
          <div style="background:${c.c.bd};color:#fff;border-radius:100px;padding:3px 12px;font-size:11px;font-weight:700;white-space:nowrap">${c.period}</div>
          <div style="font-size:10px;color:#888;margin-top:3px">Artifact: ${c.doc}</div>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${c.items.map(item=>`<span style="background:rgba(255,255,255,0.7);border:1px solid ${c.c.bd}30;border-radius:4px;padding:3px 8px;font-size:11px;color:${c.c.tx}">&#10003; ${item}</span>`).join('')}
      </div>
    </div>`).join('')}
    <div style="background:#EAF3DE;border-left:3px solid #3B6D11;padding:10px 14px;margin-top:6px;font-size:11px;color:#27500A;line-height:1.5">
      <strong>Annual roadmap alignment:</strong> The Q3 Annual Operating Plan submission (RC-ESG-005) feeds directly into the County-wide IT roadmap intake cycle (RC-GOV-005). Enhancement items from the roadmap that meet project thresholds are submitted via RC-GOV-006 beginning Q1 of the following year.
    </div>`;
  }

  else if(S.esgTab==='routing'){
    content=`<div style="margin-bottom:10px;font-size:12px;color:#888">How enterprise system enhancement and investment requests are classified and routed. The same County thresholds apply, with additional triggers specific to enterprise systems.</div>
    ${ESG_ROUTING.map(r=>`<div style="display:flex;gap:10px;padding:10px 12px;background:${r.bg};border-radius:6px;margin-bottom:6px;align-items:flex-start">
      <div style="min-width:130px;flex-shrink:0"><div style="font-size:12px;font-weight:700;color:${r.c}">${r.cls}</div><div style="font-size:10px;color:#888;margin-top:2px">Authority: ${r.auth}</div></div>
      <div style="flex:1">
        <div style="font-size:11px;color:#555;margin-bottom:4px;font-style:italic">${r.criteria}</div>
        <div style="font-size:12px;color:#333;font-weight:500">&#8594; ${r.path}</div>
      </div>
    </div>`).join('')}
    <div style="background:#FAEEDA;border-left:3px solid #854F0B;padding:10px 14px;margin-top:6px;font-size:11px;color:#633806;line-height:1.5">
      <strong>ESG-specific governance triggers (route to IT governance regardless of cost):</strong> Contract renewal with material cost/scope/risk change &middot; Residual High or Critical risk requiring executive risk acceptance &middot; New data sharing agreement or changed data classification &middot; Change affecting shared integrations or other enterprise systems
    </div>`;
  }

  else if(S.esgTab==='documents'){
    const phases=[...new Set(ESG_DOCS.map(d=>d.phase))];
    const phColors={'A — Governing framework':['#E1F5EE','#0F6E56'],'B — Register your system':['#E6F1FB','#185FA5'],'C — Run ongoing governance':['#FAEEDA','#854F0B'],'D — Annual planning cycle':['#EAD1DC','#7030A0'],'E — Strategic lifecycle decision':['#FCEBEB','#A32D2D']};
    content=phases.map(ph=>{
      const [bg,bd]=phColors[ph]||['#f5f6f7','#555'];
      const docs=ESG_DOCS.filter(d=>d.phase===ph);
      return `<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:${bd};flex-shrink:0"></div>
          <span style="font-size:12px;font-weight:600;color:#1a1a1a">Phase ${ph}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
          ${docs.map(d=>`<a href="${ESG_BASE}" target="_blank" style="text-decoration:none;display:block"><div class="dcard" style="cursor:pointer;transition:box-shadow 0.15s" onmouseover="this.style.boxShadow='0 2px 12px rgba(0,0,0,0.13)'" onmouseout="this.style.boxShadow=''">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
              <span style="font-family:'Courier New',monospace;font-size:10px;font-weight:700;color:${bd};background:${bg};padding:2px 7px;border-radius:3px">RC-ESG-${d.id}</span><span style="font-size:9px;color:#0078d4;margin-left:6px;font-family:'Segoe UI',sans-serif">&#128279; Opens SharePoint folder</span>
              <span style="background:#E1F5EE;color:#085041;border-radius:100px;font-size:9px;font-weight:600;padding:1px 6px">${d.ty}</span>
            </div>
            <div style="font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:4px;line-height:1.3">${d.t}</div>
            <div style="font-size:11px;color:#666;line-height:1.5">${d.desc}</div>
          </div></a>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  return `<div style="margin-bottom:12px">
    <div style="font-size:17px;font-weight:600;margin-bottom:2px">Enterprise systems governance</div>
    <div style="font-size:12px;color:#888">Oversight framework for ERP, EHR/eHealth, justice, HR/payroll, and other designated mission-critical systems. Aligned to RC-GOV-003 IT Governance Charter.</div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">${tabs.map(t=>tabBtn(t.k,t.l)).join('')}</div>
  ${content}`;
}

buildNav();render();
</script></body></html>
